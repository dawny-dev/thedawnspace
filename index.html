<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>THE dawn space</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }
    .wall-card {
      border: 1px solid gray;
      padding: 10px;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h1>THE DAWN SPACE</h1>

<h2>Leave a message</h2>

<input id="w-name" placeholder="your name"><br><br>
<input id="w-tag" placeholder="tag (optional)"><br><br>
<textarea id="w-msg" placeholder="say something"></textarea><br><br>

<button onclick="submitWall()">Post</button>

<h2>Wall</h2>
<div id="wall-posts"></div>

<script>
// 🔌 CONNECT TO SUPABASE
const supabase = window.supabase.createClient(
  "https://zjgmfiikowqomncqshkj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqZ21maWlrb3dxb21uY3FzaGtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjY5OTMsImV4cCI6MjA4OTYwMjk5M30.PMveXkN-wl5_R0L-U_7SfuG7y_zSDADHsjp223aACqo"
);

// 🚀 LOAD MESSAGES
async function loadWall() {
  const container = document.getElementById('wall-posts');

  const { data, error } = await supabase
    .from('wall')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    container.innerHTML = "Error loading messages";
    console.log(error);
    return;
  }

  if (!data.length) {
    container.innerHTML = "No messages yet";
    return;
  }

  container.innerHTML = '';

  data.forEach(p => {
    const div = document.createElement('div');
    div.className = 'wall-card';

    div.innerHTML = `
      <strong>${p.name || 'anonymous'}</strong><br>
      <small>${p.tag || ''}</small>
      <p>${p.msg}</p>
    `;

    container.appendChild(div);
  });
}

// ✍️ SUBMIT MESSAGE
async function submitWall() {
  const name = document.getElementById('w-name').value.trim();
  const tag  = document.getElementById('w-tag').value.trim();
  const msg  = document.getElementById('w-msg').value.trim();

  if (!msg) return;

  const { error } = await supabase.from('wall').insert([
    {
      name: name || 'anonymous',
      tag,
      msg
    }
  ]);

  if (error) {
    alert("Error posting message");
    console.log(error);
    return;
  }

  document.getElementById('w-name').value = '';
  document.getElementById('w-tag').value  = '';
  document.getElementById('w-msg').value  = '';

  loadWall();
}

// 🔄 INITIAL LOAD
loadWall();
</script>

</body>
</html>
